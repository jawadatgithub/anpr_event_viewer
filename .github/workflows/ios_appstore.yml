name: Build iOS App Store IPA

on:
  workflow_dispatch:
    inputs:
      upload_to_appstore:
        description: "Upload IPA to App Store Connect after build?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  BUNDLE_ID: com.insysout.anprviewer
  PROFILE_NAME: InSysOut ANPR AppStore
  APP_DISPLAY_NAME: InSysOut ANPR

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Ensure iOS platform files, Podfile, and configs exist
        run: |
          echo "Checking iOS project files..."

          if [ ! -d ios ]; then
            echo "ios folder is missing. Creating iOS platform files..."
            flutter create --platforms=ios --org com.insysout .
          fi

          if [ ! -d ios/Runner.xcodeproj ]; then
            echo "ios/Runner.xcodeproj is missing. Regenerating iOS platform files..."
            flutter create --platforms=ios --org com.insysout .
          fi

          if [ ! -f ios/Runner/Info.plist ]; then
            echo "ios/Runner/Info.plist is missing. Regenerating iOS platform files..."
            flutter create --platforms=ios --org com.insysout .
          fi

          echo "Running flutter pub get again after iOS platform check..."
          flutter pub get

          echo "Ensuring Flutter generated iOS config exists..."
          if [ ! -f ios/Flutter/Generated.xcconfig ]; then
            echo "ERROR: ios/Flutter/Generated.xcconfig missing."
            echo "Flutter pub get should have generated it."
            ls -la ios/Flutter || true
            exit 1
          fi

          if [ ! -f ios/Podfile ]; then
            echo "ios/Podfile is missing. Creating standard Flutter iOS Podfile..."

            cat > ios/Podfile <<'PODFILE'
          platform :ios, '13.0'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
            end

            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end

            raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}. Try deleting Generated.xcconfig, then run flutter pub get"
          end

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          flutter_ios_podfile_setup

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))

            target 'RunnerTests' do
              inherit! :search_paths
            end
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)

              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end
          PODFILE
          fi

          echo "Final iOS folder:"
          ls -la ios

          echo "Final Podfile:"
          sed -n '1,200p' ios/Podfile

          if [ ! -f ios/Podfile ]; then
            echo "ERROR: ios/Podfile still missing."
            exit 1
          fi

      - name: Generate launcher icons
        run: |
          if grep -q "flutter_launcher_icons" pubspec.yaml; then
            dart run flutter_launcher_icons
          else
            echo "flutter_launcher_icons not configured; skipping."
          fi

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision

          echo "Installed signing identities:"
          security find-identity -v -p codesigning

      - name: Patch iOS bundle ID, display name, and manual signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os
          import re

          bundle_id = os.environ["BUNDLE_ID"]
          team_id = os.environ["APPLE_TEAM_ID"]
          profile_name = os.environ["PROFILE_NAME"]
          display_name = os.environ["APP_DISPLAY_NAME"]

          pbxproj = Path("ios/Runner.xcodeproj/project.pbxproj")
          if not pbxproj.exists():
              raise SystemExit("Missing ios/Runner.xcodeproj/project.pbxproj.")

          text = pbxproj.read_text()

          text = re.sub(
              r"PRODUCT_BUNDLE_IDENTIFIER = [^;]+;",
              f"PRODUCT_BUNDLE_IDENTIFIER = {bundle_id};",
              text,
          )

          def patch_build_settings(match):
              block = match.group(0)

              if "PRODUCT_BUNDLE_IDENTIFIER" not in block:
                  return block

              block = re.sub(r'\n\s*CODE_SIGN_STYLE = [^;]+;', '', block)
              block = re.sub(r'\n\s*DEVELOPMENT_TEAM = [^;]*;', '', block)
              block = re.sub(r'\n\s*PROVISIONING_PROFILE_SPECIFIER = [^;]*;', '', block)
              block = re.sub(r'\n\s*"?CODE_SIGN_IDENTITY"? = [^;]+;', '', block)

              insert = (
                  f'\n\t\t\t\tCODE_SIGN_STYLE = Manual;'
                  f'\n\t\t\t\tDEVELOPMENT_TEAM = {team_id};'
                  f'\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "{profile_name}";'
                  f'\n\t\t\t\t"CODE_SIGN_IDENTITY" = "Apple Distribution";'
              )

              return block.replace("buildSettings = {", "buildSettings = {" + insert, 1)

          text = re.sub(
              r"buildSettings = \{.*?\n\t\t\t\};",
              patch_build_settings,
              text,
              flags=re.S,
          )

          pbxproj.write_text(text)

          info_plist = Path("ios/Runner/Info.plist")
          if not info_plist.exists():
              raise SystemExit("Missing ios/Runner/Info.plist.")

          plist = info_plist.read_text()

          if "<key>CFBundleDisplayName</key>" in plist:
              plist = re.sub(
                  r"<key>CFBundleDisplayName</key>\s*<string>.*?</string>",
                  f"<key>CFBundleDisplayName</key>\n\t<string>{display_name}</string>",
                  plist,
                  flags=re.S,
              )
          else:
              plist = plist.replace(
                  "<dict>",
                  f"<dict>\n\t<key>CFBundleDisplayName</key>\n\t<string>{display_name}</string>",
                  1,
              )

          info_plist.write_text(plist)

          print("Bundle ID:", bundle_id)
          print("Team ID:", team_id)
          print("Provisioning profile:", profile_name)
          print("Display name:", display_name)
          PY

      - name: Create ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          echo "ExportOptions.plist:"
          cat ios/ExportOptions.plist

      - name: Install CocoaPods dependencies
        run: |
          if [ ! -f ios/Podfile ]; then
            echo "ERROR: ios/Podfile missing before pod install."
            ls -la ios || true
            exit 1
          fi

          cd ios
          pod install --repo-update

      - name: Analyze Flutter project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build signed IPA
        run: |
          flutter build ipa \
            --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: List IPA output
        run: |
          ls -la build/ios/ipa

      - name: Upload IPA artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: insysout-anpr-ios-ipa
          path: build/ios/ipa/*.ipa

      - name: Prepare App Store Connect API key
        if: ${{ github.event.inputs.upload_to_appstore == 'true' }}
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/private_keys
          printf "%s" "$APPSTORE_PRIVATE_KEY" > ~/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Upload IPA to App Store Connect
        if: ${{ github.event.inputs.upload_to_appstore == 'true' }}
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            -f build/ios/ipa/*.ipa \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"